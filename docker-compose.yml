

services:
  web:
    build: .
    depends_on:
      
      - redis
    volumes:
      - .:/app
      
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_DEBUG=False
      - GDAL_DATA=/usr/share/gdal
      - DJANGO_SETTINGS_MODULE=mysite.settings
      
      
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 mysite.asgi:application"



  redis:
    image: redis:7
    container_name: redis
    volumes:
      - redis_data:/data
    restart: always

  celery_worker:
    build: .
    command: celery -A mysite worker --loglevel=info --concurrency=2
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DJANGO_DEBUG=False  # Should be False in production
      - GDAL_DATA=/usr/share/gdal
      - DJANGO_SETTINGS_MODULE=mysite.settings
      
    depends_on:
      - redis
      - web 
      
    restart: unless-stopped

  celery_beat:
    build: .
    command: celery -A mysite beat --loglevel=info
    volumes:
      - .:/app
      - beat_data:/var/celery
    env_file:
      - .env
    environment:
      - DJANGO_DEBUG=False  # Should be False in production
      - GDAL_DATA=/usr/share/gdal
      - DJANGO_SETTINGS_MODULE=mysite.settings
      
      - CELERY_BEAT_SCHEDULE_FILENAME=/var/celery/beat-schedule
    depends_on:
      - redis
     
    restart: unless-stopped

  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
     
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - web
    

volumes:
  
  redis_data:
  beat_data:
  
  