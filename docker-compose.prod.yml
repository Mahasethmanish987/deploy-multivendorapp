version: '3.8'

services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - gunicorn
      - daphne
    restart: unless-stopped
    networks:
      - app_network

  gunicorn:
    image: "{{ ecr_registry }}/{{ ecr_repo }}:{{ ecr_image_tag }}"
    command: >
      sh -c "python manage.py migrate --noinput && 
             python manage.py collectstatic --noinput --verbosity 3 &&
             gunicorn mysite.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2"
    env_file:
      - .env.prod
    restart: unless-stopped
    networks:
      - app_network

  daphne:
    image: "{{ ecr_registry }}/{{ ecr_repo }}:{{ ecr_image_tag }}"
    command: daphne -b 0.0.0.0 -p 8001 mysite.asgi:application
    env_file:
      - .env.prod
    restart: unless-stopped
    networks:
      - app_network


networks:
  app_network:
    driver: bridge