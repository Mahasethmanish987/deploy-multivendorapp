name: Deploy To Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code 
        uses: actions/checkout@v4

      - name: Add EC2 To Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2 server 
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Create and navigate to directory
            mkdir -p /home/ubuntu/foodonline
            cd /home/ubuntu/foodonline
            
            # Initialize Git repository
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/Mahasethmanish987/deploy-multivendorapp.git
            fi
            
            # Get latest code
            git fetch origin
            git reset --hard origin/master
            git pull origin master
            
            # Verify critical files
            if [ ! -f docker-compose.yml ]; then
              echo "WARNING: docker-compose.yml is missing! Creating placeholder."
              echo "version: '3.8'" > docker-compose.yml
              echo "services:" >> docker-compose.yml
              echo "  placeholder:" >> docker-compose.yml
              echo "    image: nginx:alpine" >> docker-compose.yml
            fi
            
            # Docker commands
            docker compose down || true
            docker compose build
            docker compose up -d
            
            # Check status
            docker ps -a
            docker compose logs