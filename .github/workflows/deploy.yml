name:  Deploy To Production 


on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on:  ubuntu-latest


    steps:
     - name: Checkout code 
       uses: actions/checkout@v4

     - name: Add EC2 To Known Hosts
       run: |
         mkdir -p ~/.ssh
         ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
     - name: Deploy to Ec2 server 
       uses: appleboy/ssh-action@v1.0.0
       with:
         host:  ${{ secrets.EC2_HOST }}
         username:  ${{ secrets.EC2_USERNAME }}
         key:  ${{ secrets.EC2_SSH_KEY }}
         script: |
           #Navigate to the project directory
           cd /home/ubuntu/foodonline
           if [ ! -d .git ]; then
              if [ -z "$(ls -A)" ]; then
                git clone https://github.com/Mahasethmanish987/deploy-multivendorapp.git .
              else
                  git remote add origin https://github.com/Mahasethmanish987/deploy-multivendorapp.git
                  git fetch
                  git checkout master -f 
              fi
            fi      
           git reset --hard origin/master
           git pull origin master
           if [ ! -f docker-compose.yml ]; then
              echo "ERROR: docker-compose.yml is missing!"
              exit 1
           fi
           
           docker compose up -d --build
           docker ps -a 
           docker compose logs 



          